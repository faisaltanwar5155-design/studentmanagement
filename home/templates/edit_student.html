<html>
    <head>
        <title>Edit Student</title>
    </head>
    <body>
        <h1>Edit Student</h1>
        <form method="post">
            {% csrf_token %}
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ student.name }}" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ student.email }}" required><br><br>
            <label for="course">Course:</label>
            <input type="text" id="course" name="course" value="{{ student.course }}" required><br><br>
            <button type="submit">Update Student</button>
        </form>
        <br>
        <a href="/students">Back</a>
    </body>
</html>
